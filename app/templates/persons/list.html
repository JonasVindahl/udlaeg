{% extends "base.html" %}
{% block title %}Personer – Udlæg{% endblock %}
{% block content %}
<p class="eyebrow">Kartotek</p>
<h1>Personer</h1>

<form class="inline-form" hx-post="/persons" hx-target="#person-rows" hx-swap="outerHTML"
      hx-on::after-request="this.reset()">
  <input type="text" name="name" placeholder="Navn på ny person" required>
  <button type="submit">Tilføj</button>
</form>

<table class="data">
  <thead><tr><th>Navn</th><th>Oprettet</th><th>Delelink</th><th></th></tr></thead>
  {% include "partials/person_rows.html" %}
</table>

<script>
  document.addEventListener("click", function (e) {
    var btn = e.target.closest(".copy-btn");
    if (!btn) return;
    navigator.clipboard.writeText(btn.dataset.url).then(function () {
      var old = btn.textContent;
      btn.textContent = "Kopieret ✓";
      setTimeout(function () { btn.textContent = old; }, 1600);
    });
  });
</script>
{% endblock %}
