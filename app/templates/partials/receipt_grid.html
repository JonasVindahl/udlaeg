{% if expense.receipts %}
<div class="thumbs">
  {% for r in expense.receipts %}
  <div class="thumb">
    {% if r.mime_type.startswith("image/") %}
      <a href="/receipts/{{ r.id }}/file" target="_blank">
        <img src="/receipts/{{ r.id }}/file" alt="kvittering">
      </a>
    {% else %}
      <a href="/receipts/{{ r.id }}/file" target="_blank" class="pdf-tile">PDF</a>
    {% endif %}
    <button class="link danger" hx-post="/receipts/{{ r.id }}/delete"
            hx-target="#receipt-section" hx-swap="innerHTML"
            hx-confirm="Slet kvittering?">Slet</button>
  </div>
  {% endfor %}
</div>
{% else %}
<p class="muted">Ingen kvitteringer endnu.</p>
{% endif %}
