<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f1e6">
  <meta name="color-scheme" content="light">
  <title>{% block title %}Udlæg{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
</head>
<body>
  {% set _path = request.scope.get("path") %}
  {% if _path != "/login" %}
  <nav class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">U</span>
      <span class="brand-text">Udlæg</span>
    </a>
    <div class="nav-links">
      <a href="/" {% if _path == "/" %}aria-current="page"{% endif %}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="/persons" {% if _path.startswith("/persons") %}aria-current="page"{% endif %}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><path d="M16 5.2a3.2 3.2 0 0 1 0 6"/><path d="M17.5 14.2A5.5 5.5 0 0 1 21 19"/></svg>
        <span>Personer</span>
      </a>
      <a href="/expenses" {% if _path.startswith("/expenses") %}aria-current="page"{% endif %}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12v18l-2.5-1.5L13 21l-2.5-1.5L8 21 5.5 19.5 6 21z" transform="translate(0 -1)"/><path d="M9 8h6M9 12h6"/></svg>
        <span>Udlæg</span>
      </a>
      <a href="/logout" class="nav-quiet">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 5H6.5A1.5 1.5 0 0 0 5 6.5v11A1.5 1.5 0 0 0 6.5 19H14"/><path d="M16 8l4 4-4 4M20 12H10"/></svg>
        <span>Log ud</span>
      </a>
    </div>
  </nav>
  {% endif %}
  <main class="container{% if _path == '/login' %} container--bare{% endif %}">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
